name: Pipeline

on: 
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  job-1:
    runs-on: ubuntu-latest
    steps:
    
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin' # See 'Supported distributions' for available options
          java-version: '17'
      
      - name: Installing maven
        uses: s4u/setup-maven-action@v4
        with: 
         maven_version: '3.9.11'

      - name: checkout
        uses: actions/checkout@v4

      - name: Build
        run: mvn compile

      - name: Test
        run: mvn test

      - name: Artifact
        run: mvn package
         
   
      
          
